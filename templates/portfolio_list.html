{% extends "layout.html" %}
{% block content %}
<main class="portfolio-list-page">

    <div class="portfolio-list-header">
        <h1>Your Portfolios</h1>
        <a href="{{ url_for('create_portfolio')}}" class="small-btn">
            Add Portfolio
        </a>
    </div>

    <table class="portfolio-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Cash</th>
                <th>Details</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>

        <tbody>
        {% for portfolio in portfolios %}

            <tr>
                <td>{{ portfolio.id }}</td>
                <td>{{ portfolio.name }}</td>

                <td>${{ "%.2f"|format(portfolio.cash) }}</td>

                <td>
                    <form action="{{ url_for('portfolio', portfolio_id=portfolio.id) }}"
                     method="get">
                        <button type="submit" class="small-btn">
                            Detail
                        </button>
                    </form>
                </td>
                <td>
                    <form action="{{ url_for('edit_portfolio', portfolio_id=portfolio.id) }}"
                    method="get">
                        <button type="submit" class="small-btn">
                            Edit
                        </button>
                    </form>
                </td>
                
                <td>
                    <form action="{{ url_for('delete_portfolio', portfolio_id=portfolio.id) }}"
                        method="post"
                        onsubmit="return confirm('Are you sure you want to delete this portfolio?');">
                        <button type="submit" class="small-btn">Delete</button>
                    </form>
                </td>
            </tr>

        {% endfor %}
        </tbody>
    </table>

</main>

{% endblock content %}
